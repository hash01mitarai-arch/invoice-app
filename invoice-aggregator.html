<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書集計</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --accent: #4ade80;
    --accent2: #22d3ee;
    --text: #e8eaf0;
    --muted: #6b7280;
    --danger: #f87171;
    --warning: #fbbf24;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: #000;
    font-weight: 500;
  }

  header h1 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  header span {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: auto;
    border: 1px solid var(--border);
  }

  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 20px;
    max-width: 1200px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Upload zone */
  .upload-zone {
    margin: 20px;
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(74, 222, 128, 0.04);
  }

  .upload-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon {
    font-size: 32px;
    margin-bottom: 12px;
    display: block;
  }

  .upload-zone p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .upload-zone strong {
    color: var(--accent);
    font-weight: 500;
  }

  /* Month & Client selectors */
  .form-row {
    padding: 0 20px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .form-group input, .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }

  .form-group select option { background: var(--surface2); }

  /* Process button */
  .btn-process {
    display: block;
    width: calc(100% - 40px);
    margin: 0 20px 20px;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), #22c55e);
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-process:hover { opacity: 0.9; }
  .btn-process:active { transform: scale(0.98); }
  .btn-process:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Invoices list */
  .invoice-list {
    padding: 0 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 320px;
    overflow-y: auto;
  }

  .invoice-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .invoice-item .thumb {
    width: 36px; height: 36px;
    background: var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .invoice-item .info { flex: 1; min-width: 0; }
  .invoice-item .info .name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .invoice-item .info .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .invoice-item .amount {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }

  .invoice-item .status {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
  }

  .status.processing { background: rgba(251,191,36,0.15); color: var(--warning); }
  .status.done { background: rgba(74,222,128,0.12); color: var(--accent); }
  .status.error { background: rgba(248,113,113,0.12); color: var(--danger); }

  .btn-delete {
    background: none; border: none; color: var(--muted);
    cursor: pointer; padding: 4px; border-radius: 4px;
    transition: color 0.2s;
    font-size: 14px;
  }
  .btn-delete:hover { color: var(--danger); }

  /* Right panel - stats */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Summary cards */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .card .card-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .card .card-value {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: var(--text);
  }

  .card .card-value.green { color: var(--accent); }
  .card .card-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Tables */
  .table-container {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody td {
    padding: 12px 16px;
    vertical-align: middle;
  }

  .mono { font-family: 'DM Mono', monospace; font-size: 12px; }
  .text-right { text-align: right; }
  .text-green { color: var(--accent); }
  .text-muted { color: var(--muted); }

  .bar-wrap {
    width: 100px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* Month pills */
  .month-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .month-tab {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
  }

  .month-tab.active, .month-tab:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .empty .emoji { font-size: 32px; display: block; margin-bottom: 12px; }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Tab nav */
  .tab-nav {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    padding: 12px 20px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    margin-bottom: -1px;
  }

  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .summary-cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">¥</div>
  <h1>請求書集計</h1>
  <span>RAT GARAGE</span>
</header>

<div class="layout">
  <!-- Left: Input panel -->
  <div>
    <div class="panel">
      <div class="panel-header"><div class="dot"></div>請求書を追加</div>

      <div class="upload-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*,.pdf" multiple>
        <span class="upload-icon">📄</span>
        <p><strong>ファイルをドロップ</strong>またはクリックして選択<br>画像・PDF に対応</p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>取引先</label>
          <input type="text" id="clientName" placeholder="会社名・氏名">
        </div>
        <div class="form-group">
          <label>対象月</label>
          <input type="month" id="invoiceMonth">
        </div>
      </div>

      <button class="btn-process" id="processBtn" onclick="processInvoices()">
        AIで読み取り・追加
      </button>

      <div class="panel-header" style="border-top: 1px solid var(--border)">
        <div class="dot" style="background: var(--accent2)"></div>
        追加済み請求書
      </div>
      <div class="invoice-list" id="invoiceList">
        <div class="empty"><span class="emoji">📋</span>まだ請求書がありません</div>
      </div>
    </div>
  </div>

  <!-- Right: Stats panel -->
  <div class="right-panel">
    <div class="summary-cards">
      <div class="card">
        <div class="card-label">今月合計</div>
        <div class="card-value green" id="totalAmount">¥0</div>
        <div class="card-sub" id="totalCount">0件</div>
      </div>
      <div class="card">
        <div class="card-label">取引先数</div>
        <div class="card-value" id="clientCount">0</div>
        <div class="card-sub">社・者</div>
      </div>
      <div class="card">
        <div class="card-label">最大単件</div>
        <div class="card-value" id="maxAmount">¥0</div>
        <div class="card-sub" id="maxClient">-</div>
      </div>
    </div>

    <div class="panel" style="flex: 1">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('month')">月別集計</button>
        <button class="tab-btn" onclick="switchTab('client')">取引先別</button>
        <button class="tab-btn" onclick="switchTab('all')">全件リスト</button>
      </div>

      <!-- Month tab -->
      <div class="tab-content active" id="tab-month">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>月</th>
                <th class="text-right">件数</th>
                <th class="text-right">合計金額</th>
                <th>割合</th>
              </tr>
            </thead>
            <tbody id="monthTable">
              <tr><td colspan="4"><div class="empty"><span class="emoji">📅</span>データなし</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Client tab -->
      <div class="tab-content" id="tab-client">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>取引先</th>
                <th class="text-right">件数</th>
                <th class="text-right">合計金額</th>
                <th>割合</th>
              </tr>
            </thead>
            <tbody id="clientTable">
              <tr><td colspan="4"><div class="empty"><span class="emoji">🏢</span>データなし</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- All tab -->
      <div class="tab-content" id="tab-all">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>月</th>
                <th>取引先</th>
                <th>内容</th>
                <th class="text-right">金額</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="allTable">
              <tr><td colspan="5"><div class="empty"><span class="emoji">📋</span>データなし</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
let pendingFiles = [];

// Set default month to current
const now = new Date();
document.getElementById('invoiceMonth').value =
  `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

// File input
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  pendingFiles = [...e.dataTransfer.files];
  updateDropLabel();
});
fileInput.addEventListener('change', () => {
  pendingFiles = [...fileInput.files];
  updateDropLabel();
});

function updateDropLabel() {
  const p = dropZone.querySelector('p');
  if (pendingFiles.length > 0) {
    p.innerHTML = `<strong>${pendingFiles.length}件</strong>のファイルが選択されました`;
  }
}

async function processInvoices() {
  const client = document.getElementById('clientName').value.trim();
  const month = document.getElementById('invoiceMonth').value;

  if (pendingFiles.length === 0) {
    // Manual entry mode if no files
    if (!client || !month) {
      alert('取引先名と対象月を入力してください');
      return;
    }
    const amount = prompt('金額を入力してください（数字のみ）:');
    if (!amount || isNaN(amount)) return;
    const desc = prompt('内容（任意）:') || '';

    invoices.push({ id: Date.now(), client: client || '不明', month, amount: parseInt(amount), desc, source: 'manual' });
    saveAndRender();
    return;
  }

  const btn = document.getElementById('processBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>AI読み取り中...';

  for (const file of pendingFiles) {
    await extractFromFile(file, client, month);
  }

  btn.disabled = false;
  btn.innerHTML = 'AIで読み取り・追加';
  pendingFiles = [];
  fileInput.value = '';
  dropZone.querySelector('p').innerHTML = '<strong>ファイルをドロップ</strong>またはクリックして選択<br>画像・PDF に対応';
  saveAndRender();
}

async function extractFromFile(file, clientHint, month) {
  // Add placeholder
  const tempId = Date.now() + Math.random();
  const isImage = file.type.startsWith('image/');
  const isPdf = file.type === 'application/pdf';

  // Convert to base64
  const base64 = await fileToBase64(file);
  const mediaType = file.type;

  // Build prompt
  const systemPrompt = `あなたは請求書読み取りの専門AIです。
請求書の画像またはテキストから以下を抽出してください。
必ずJSON形式のみで回答し、他のテキストは含めないこと。
{
  "client": "取引先名（わからなければ空文字）",
  "amount": 数値（税込合計金額、わからなければ0）,
  "desc": "内容・品目の簡潔な説明（最大30文字）",
  "date": "YYYY-MM形式の請求月（わからなければ空文字）"
}`;

  let messages;
  if (isImage) {
    messages = [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: '請求書から情報を抽出してください。' }
      ]
    }];
  } else {
    // PDF or other - treat as text request with file name context
    messages = [{
      role: 'user',
      content: `ファイル名: ${file.name}\n取引先ヒント: ${clientHint || 'なし'}\n対象月ヒント: ${month || 'なし'}\n\nこの情報からJSONを生成してください。ファイルが読めない場合は取引先とヒント情報のみ使って生成してください。`
    }];
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages
      })
    });

    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    invoices.push({
      id: tempId,
      client: parsed.client || clientHint || '不明',
      month: parsed.date || month,
      amount: parsed.amount || 0,
      desc: parsed.desc || file.name,
      source: file.name
    });
  } catch (e) {
    // Fallback: add with manual data
    invoices.push({
      id: tempId,
      client: clientHint || '不明',
      month,
      amount: 0,
      desc: file.name,
      source: file.name,
      error: true
    });
  }
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function deleteInvoice(id) {
  invoices = invoices.filter(i => i.id !== id);
  saveAndRender();
}

function saveAndRender() {
  localStorage.setItem('invoices', JSON.stringify(invoices));
  renderInvoiceList();
  renderStats();
  renderTables();
}

function renderInvoiceList() {
  const list = document.getElementById('invoiceList');
  if (invoices.length === 0) {
    list.innerHTML = '<div class="empty"><span class="emoji">📋</span>まだ請求書がありません</div>';
    return;
  }
  list.innerHTML = invoices.slice().reverse().map(inv => `
    <div class="invoice-item">
      <div class="thumb">${inv.error ? '⚠️' : '📄'}</div>
      <div class="info">
        <div class="name">${esc(inv.client)}</div>
        <div class="meta">${inv.month} · ${esc(inv.desc || inv.source)}</div>
      </div>
      <div class="amount">${inv.amount ? '¥' + inv.amount.toLocaleString() : '要確認'}</div>
      <button class="btn-delete" onclick="deleteInvoice(${inv.id})">✕</button>
    </div>
  `).join('');
}

function renderStats() {
  const total = invoices.reduce((s, i) => s + (i.amount || 0), 0);
  const clients = new Set(invoices.map(i => i.client));
  const maxInv = invoices.reduce((m, i) => (i.amount > (m?.amount || 0) ? i : m), null);

  document.getElementById('totalAmount').textContent = '¥' + total.toLocaleString();
  document.getElementById('totalCount').textContent = invoices.length + '件';
  document.getElementById('clientCount').textContent = clients.size;
  document.getElementById('maxAmount').textContent = maxInv ? '¥' + maxInv.amount.toLocaleString() : '¥0';
  document.getElementById('maxClient').textContent = maxInv?.client || '-';
}

function renderTables() {
  const total = invoices.reduce((s, i) => s + (i.amount || 0), 0);

  // Month table
  const byMonth = {};
  invoices.forEach(i => {
    if (!byMonth[i.month]) byMonth[i.month] = { count: 0, amount: 0 };
    byMonth[i.month].count++;
    byMonth[i.month].amount += i.amount || 0;
  });

  const monthRows = Object.entries(byMonth).sort((a,b) => b[0].localeCompare(a[0]));
  document.getElementById('monthTable').innerHTML = monthRows.length === 0
    ? '<tr><td colspan="4"><div class="empty"><span class="emoji">📅</span>データなし</div></td></tr>'
    : monthRows.map(([m, d]) => `
      <tr>
        <td class="mono">${m}</td>
        <td class="text-right text-muted">${d.count}件</td>
        <td class="text-right mono text-green">¥${d.amount.toLocaleString()}</td>
        <td><div class="bar-wrap"><div class="bar-fill" style="width:${total ? (d.amount/total*100) : 0}%"></div></div></td>
      </tr>
    `).join('');

  // Client table
  const byClient = {};
  invoices.forEach(i => {
    if (!byClient[i.client]) byClient[i.client] = { count: 0, amount: 0 };
    byClient[i.client].count++;
    byClient[i.client].amount += i.amount || 0;
  });

  const clientRows = Object.entries(byClient).sort((a,b) => b[1].amount - a[1].amount);
  document.getElementById('clientTable').innerHTML = clientRows.length === 0
    ? '<tr><td colspan="4"><div class="empty"><span class="emoji">🏢</span>データなし</div></td></tr>'
    : clientRows.map(([c, d]) => `
      <tr>
        <td>${esc(c)}</td>
        <td class="text-right text-muted">${d.count}件</td>
        <td class="text-right mono text-green">¥${d.amount.toLocaleString()}</td>
        <td><div class="bar-wrap"><div class="bar-fill" style="width:${total ? (d.amount/total*100) : 0}%"></div></div></td>
      </tr>
    `).join('');

  // All table
  document.getElementById('allTable').innerHTML = invoices.length === 0
    ? '<tr><td colspan="5"><div class="empty"><span class="emoji">📋</span>データなし</div></td></tr>'
    : invoices.slice().reverse().map(i => `
      <tr>
        <td class="mono text-muted">${i.month}</td>
        <td>${esc(i.client)}</td>
        <td class="text-muted" style="font-size:12px">${esc(i.desc || '')}</td>
        <td class="text-right mono ${i.amount ? 'text-green' : 'text-muted'}">${i.amount ? '¥'+i.amount.toLocaleString() : '要確認'}</td>
        <td><button class="btn-delete" onclick="deleteInvoice(${i.id})">✕</button></td>
      </tr>
    `).join('');
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['month','client','all'][i] === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Initial render
saveAndRender();
</script>
</body>
</html>
